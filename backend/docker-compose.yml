version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ciip_db
    environment:
      POSTGRES_USER: ciip
      POSTGRES_PASSWORD: ciip_dev_pass
      POSTGRES_DB: ciip
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: ciip_graph
    environment:
      NEO4J_AUTH: neo4j/ciip_graph_pass
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  neo4jdata:
