# File: .gitlab-ci.yml
# Minimal CI: run the backend unit test suite.
# The extraction/normalization tests are pure (no database), so this job
# needs no services and stays fast.
#
# WHY this shape:
# - The workflow block allows MR pipelines and default-branch pipelines,
#   and avoids creating a duplicate branch pipeline when an MR is open.
# - The job's own rules explicitly opt it INTO merge_request pipelines
#   (a job with no rules does NOT run in MR pipelines, which previously
#   produced an empty -> failed pipeline).
# - DATABASE_URL/SECRET_KEY are DUMMY values: the fail-closed config
#   requires them at import time, but the pure tests never open a
#   connection, so a placeholder URL is sufficient and no DB is needed.

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

stages:
  - test

backend-tests:
  stage: test
  image: python:3.12-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  variables:
    # Placeholders so settings load; tests never connect to this DB.
    DATABASE_URL: "postgresql+psycopg://ci:ci@localhost:5432/ci"
    SECRET_KEY: "ci-test-secret-not-used-for-real-auth"
  before_script:
    - cd backend
    - python -m pip install --upgrade pip
    - pip install -r requirements-dev.txt
  script:
    - pytest -q
