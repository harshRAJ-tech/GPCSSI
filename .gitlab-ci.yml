# File: .gitlab-ci.yml
# Minimal CI: run the backend unit test suite on every relevant change.
# The extraction/normalization tests are pure (no database), so this job
# needs no services and stays fast.

stages:
  - test

backend-tests:
  stage: test
  image: python:3.12-slim
  # Only run when backend code or this pipeline file changes.
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - backend/**/*
        - .gitlab-ci.yml
    - if: '$CI_COMMIT_BRANCH'
      changes:
        - backend/**/*
        - .gitlab-ci.yml
  cache:
    key:
      files:
        - backend/requirements-dev.txt
    paths:
      - .cache/pip
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  before_script:
    - cd backend
    - python -m pip install --upgrade pip
    - pip install -r requirements-dev.txt
  script:
    - pytest -q
