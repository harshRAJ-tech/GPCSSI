# File: .gitlab-ci.yml
# Minimal CI: run the backend unit test suite on branch pushes.
# The extraction/normalization tests are pure (no database), so this job
# needs no services and stays fast.
#
# Kept intentionally simple: a single branch pipeline with one job and no
# rules/workflow gymnastics, which is the most reliable configuration for
# a new project. (MR-only / changes-scoped rules can be reintroduced once
# the pipeline is confirmed green.)

stages:
  - test

backend-tests:
  stage: test
  image: python:3.12-slim
  before_script:
    - cd backend
    - python -m pip install --upgrade pip
    - pip install -r requirements-dev.txt
  script:
    - pytest -q
